<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группа</title>
    <link rel="stylesheet" href="main.css">
    <style>
        /* Анимация появления нового столбца (без фона) */
        th.new-col, td.new-col {
            animation: fadeInCol 0.4s ease-out;
        }
        @keyframes fadeInCol {
            from { opacity: 0; transform: scaleX(0.8); }
            to { opacity: 1; transform: scaleX(1); }
        }
        /* Анимация исчезновения столбца */
        th.fade-out-col, td.fade-out-col {
            opacity: 0;
            transition: opacity 0.3s ease-in;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="group-page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
    <a href="index.html" class="back-btn" style="background:#6c757d; color:white; border-radius:30px; padding: 10px 26px; font-weight:bold; text-decoration:none; transition: 0.2s;">← Назад</a>
    <h1 class="group-title" id="groupTitle" style="margin:0; text-decoration:underline; color: var(--btn-bg); font-weight:bold; font-style:italic;"></h1>
    <button id="themeToggleGroup" class="theme-toggle-btn" style="padding: 8px 18px;">🌙</button>
</div>

<div class="stats-toolbar">
    <span class="student-count" id="studentCount">Всего студентов: 0</span>
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск по № или ФИО...">
    <button class="export-btn" id="exportBtn">📊 Экспорт в Excel</button>
</div>

<div class="scroll-container">
    <table id="attendanceTable">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<button class="clear-marks-btn" id="clearMarksBtn">🧹 Очистить все отметки</button>

<script>
const urlParams = new URLSearchParams(window.location.search);
const subject = urlParams.get('subject');
const group = urlParams.get('group');
if (!subject || !group) {
    alert('Не указаны предмет и группа');
    window.location.href = 'index.html';
}
document.getElementById('groupTitle').textContent = `${subject} — ${group}`;
const STORAGE_KEY = `groupData_${subject}_${group}`;

function applyTheme() {
    const theme = localStorage.getItem('theme') || 'light';
    const btn = document.getElementById('themeToggleGroup');
    if (theme === 'dark') {
        document.body.classList.add('dark-mode');
        btn.textContent = '☀️';
    } else {
        document.body.classList.remove('dark-mode');
        btn.textContent = '🌙';
    }
}
document.getElementById('themeToggleGroup').onclick = () => {
    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'light' : 'dark');
    applyTheme();
};

function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
        try {
            const parsed = JSON.parse(stored);
            if (parsed && Array.isArray(parsed.students) && Array.isArray(parsed.dates) && typeof parsed.attendance === 'object') {
                return parsed;
            }
        } catch(e) {}
    }
    return { students: [], dates: [], attendance: {} };
}
let data = loadData();

function autoSave() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

const nonAttendance = new Set(['-', '0', 'н', 'б/у', 'бу', 'б/y', 'y']);
function isAttendanceMark(val) {
    return val.trim() !== '' && !nonAttendance.has(val.trim().toLowerCase());
}

function getAttendanceCount(si) {
    let cnt = 0;
    data.dates.forEach((_, di) => {
        if (isAttendanceMark(data.attendance[`${si},${di}`] || '')) cnt++;
    });
    return cnt;
}

document.getElementById('searchInput').addEventListener('input', function(e) {
    const query = e.target.value.trim().toLowerCase();
    document.querySelectorAll('#attendanceTable tbody tr:not(.add-row)').forEach(row => {
        const num = row.querySelector('.row-number')?.textContent || '';
        const name = row.querySelector('.student-name')?.textContent.toLowerCase() || '';
        row.classList.toggle('hidden-row', query !== '' && !num.includes(query) && !name.includes(query));
    });
});

// ---------- УДАЛЕНИЕ ДАТЫ с анимацией ----------
function animateAndRemoveDate(dateIndex) {
    const cols = document.querySelectorAll(
        `#attendanceTable thead th:nth-child(${dateIndex + 4}),
         #attendanceTable tbody tr td:nth-child(${dateIndex + 4})`
    );
    cols.forEach(cell => cell.classList.add('fade-out-col'));

    setTimeout(() => {
        removeDate(dateIndex);
        renderTable();
        autoSave();
    }, 300);
}

// ---------- ОТРИСОВКА ТАБЛИЦЫ ----------
function renderTable(highlightNew = false, newDateIndex = -1) {
    const table = document.getElementById('attendanceTable');
    const thead = table.querySelector('thead');
    const tbody = table.querySelector('tbody');
    thead.innerHTML = '';
    tbody.innerHTML = '';

    // Заголовок
    const hr = document.createElement('tr');
    ['№', 'ФИО', 'Посещено'].forEach(t => { const th = document.createElement('th'); th.textContent = t; hr.appendChild(th); });
    data.dates.forEach((date, di) => {
        const th = document.createElement('th');
        th.innerHTML = `${date} <button class="delete-btn">✕</button>`;
        th.querySelector('.delete-btn').onclick = (e) => {
            e.stopPropagation();
            if (confirm(`Удалить дату "${date}"?`)) {
                animateAndRemoveDate(di);
            }
        };
        if (di === newDateIndex) {
            th.classList.add('new-col');
            setTimeout(() => th.classList.remove('new-col'), 400);
        }
        hr.appendChild(th);
    });
    const thAdd = document.createElement('th');
    thAdd.className = 'add-cell';
    thAdd.textContent = '+';
    thAdd.onclick = () => {
        const d = prompt('Дата (дд.мм.гггг):');
        if (d && d.trim()) {
            data.dates.push(d.trim());
            renderTable(false, data.dates.length - 1);
            autoSave();
        }
    };
    hr.appendChild(thAdd);
    thead.appendChild(hr);

    // Строки студентов
    data.students.forEach((student, si) => {
        const tr = document.createElement('tr');
        if (highlightNew && si === data.students.length - 1) tr.classList.add('new-row');

        const tdNum = document.createElement('td');
        tdNum.className = 'row-number';
        tdNum.textContent = si + 1;
        tr.appendChild(tdNum);

        const tdFio = document.createElement('td');
        const span = document.createElement('span');
        span.className = 'student-name';
        span.textContent = student;
        span.contentEditable = 'true';
        span.oninput = () => { data.students[si] = span.textContent.trim(); autoSave(); };
        tdFio.appendChild(span);
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '✕';
        delBtn.onclick = (e) => {
            e.stopPropagation();
            if (data.students.length <= 1) return alert('Нельзя удалить последнего студента');
            if (confirm(`Удалить ${student}?`)) {
                tr.classList.add('fade-out');
                setTimeout(() => {
                    removeStudent(si);
                    renderTable();
                    autoSave();
                }, 300);
            }
        };
        tdFio.appendChild(delBtn);
        tr.appendChild(tdFio);

        const tdAtt = document.createElement('td');
        tdAtt.textContent = getAttendanceCount(si);
        tr.appendChild(tdAtt);

        data.dates.forEach((_, di) => {
            const td = document.createElement('td');
            const key = `${si},${di}`;
            td.textContent = data.attendance[key] || '';
            td.contentEditable = 'true';
            td.oninput = () => {
                let val = td.textContent.trim();
                if (val.length > 3) val = val.slice(0,3);
                data.attendance[key] = val;
                tdAtt.textContent = getAttendanceCount(si);
                autoSave();
            };
            if (di === newDateIndex) {
                td.classList.add('new-col');
                setTimeout(() => td.classList.remove('new-col'), 400);
            }
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });

    // Строка добавления студента
    const addRow = document.createElement('tr');
    addRow.className = 'add-row';
    const tdAdd = document.createElement('td');
    tdAdd.className = 'add-cell';
    tdAdd.textContent = '+';
    tdAdd.colSpan = 4 + data.dates.length;
    tdAdd.onclick = () => {
        const name = prompt('ФИО студента:');
        if (name && name.trim()) {
            data.students.push(name.trim());
            renderTable(true);
            autoSave();
        }
    };
    addRow.appendChild(tdAdd);
    tbody.appendChild(addRow);

    document.getElementById('studentCount').textContent = `Всего студентов: ${data.students.length}`;
}

function removeStudent(si) {
    data.students.splice(si, 1);
    const newAtt = {};
    Object.keys(data.attendance).forEach(key => {
        const [s, d] = key.split(',').map(Number);
        if (s === si) return;
        newAtt[`${s > si ? s-1 : s},${d}`] = data.attendance[key];
    });
    data.attendance = newAtt;
}

function removeDate(di) {
    data.dates.splice(di, 1);
    const newAtt = {};
    Object.keys(data.attendance).forEach(key => {
        const [s, d] = key.split(',').map(Number);
        if (d === di) return;
        newAtt[`${s},${d > di ? d-1 : d}`] = data.attendance[key];
    });
    data.attendance = newAtt;
}

document.getElementById('clearMarksBtn').onclick = () => {
    if (confirm('Удалить все отметки?')) {
        data.attendance = {};
        autoSave();
        renderTable();
    }
};

document.getElementById('exportBtn').onclick = () => {
    let csv = '№;ФИО;' + data.dates.join(';') + '\n';
    data.students.forEach((s, i) => {
        csv += `${i+1};${s}`;
        data.dates.forEach((_, d) => csv += ';' + (data.attendance[`${i},${d}`] || ''));
        csv += '\n';
    });
    const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${subject}_${group}.csv`;
    a.click();
};

applyTheme();
renderTable();
</script>
</body>
</html>
