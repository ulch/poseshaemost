<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Группа <span id="groupNameDisplay"></span></title>
    <style>
        /* === ПЕРЕМЕННЫЕ === */
        :root {
            --body-bg: #f0f0f0;
            --text-color: #191818;
            --header-bg: #4a5a6a;
            --card-bg: white;
            --border-color: #ccc;
            --cell-bg: white;
            --edit-bg: #fffde7;
            --btn-bg: #4a5a6a;
            --btn-hover: #2c3e50;
            --danger-bg: #dc3545;
            --danger-hover: #a71d2a;
        }

        body.dark-mode {
            --body-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --header-bg: #2c3e50;
            --card-bg: #2d2d2d;
            --border-color: #555;
            --cell-bg: #2d2d2d;
            --edit-bg: #3a3a3a;
            --btn-bg: #3a4a5a;
            --btn-hover: #4a5a6a;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--body-bg);
            color: var(--text-color);
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .toolbar {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .toolbar button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: var(--btn-bg);
            color: white;
            transition: background 0.3s;
        }

        .toolbar button:hover {
            background: var(--btn-hover);
        }

        .toolbar button.clear-marks-btn {
            background: var(--danger-bg);
        }
        .toolbar button.clear-marks-btn:hover {
            background: var(--danger-hover);
        }

        .scroll-container {
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            min-width: 100%;
            background: var(--card-bg);
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: center;
            white-space: nowrap;
            color: var(--text-color);
        }

        th {
            background-color: var(--header-bg);
            color: white;
        }

        td:first-child {
            background: var(--cell-bg);
            font-weight: bold;
            text-align: left;
        }

        td[contenteditable="true"] {
            background: var(--edit-bg);
            cursor: text;
            min-width: 40px;
        }

        td[contenteditable="true"]:focus {
            outline: 2px dashed var(--header-bg);
        }

        .delete-btn {
            background: var(--danger-bg);
            color: white;
            border: none;
            border-radius: 3px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
        }

        .delete-btn:hover {
            background: var(--danger-hover);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 10px;
            color: var(--text-color);
            text-decoration: underline;
        }

        .back-link:hover {
            opacity: 0.8;
        }

        .student-count {
            margin: 5px 0 10px;
            font-size: 14px;
            color: var(--text-color);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Назад к списку групп</a>
    <h1>Группа: <span id="groupNameDisplay"></span></h1>
    <p class="student-count" id="studentCount"></p>

    <div class="toolbar">
        <button onclick="toggleTheme()" id="themeToggleBtn">🌙 Тёмная тема</button>
        <button onclick="addStudent()">＋ Добавить студента</button>
        <button onclick="addDate()">＋ Добавить дату</button>
        <button onclick="saveData()">💾 Сохранить</button>
        <button onclick="clearAllMarks()" class="clear-marks-btn">🧹 Очистить все отметки</button>
    </div>

    <div class="scroll-container">
        <table id="attendanceTable">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // === АВТОРИЗАЦИЯ ===
        if (localStorage.getItem('viewerLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // === ПОЛУЧЕНИЕ ИМЕНИ ГРУППЫ ИЗ URL ===
        const urlParams = new URLSearchParams(window.location.search);
        let groupName = urlParams.get('group');
        if (!groupName) {
            alert('Не указана группа');
            window.location.href = 'index.html';
        }
        // Декодируем, чтобы поддерживать русские названия
        groupName = decodeURIComponent(groupName);
        document.getElementById('groupNameDisplay').textContent = groupName;
        document.title = 'Группа ' + groupName;

        const STORAGE_KEY = 'groupData_' + groupName;
        // Начальные данные пусты
        const defaultStudents = [];
        const defaultDates = [];

        // === ТЕМА ===
        function applyTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            const btn = document.getElementById('themeToggleBtn');
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                btn.textContent = '☀️ Светлая тема';
            } else {
                document.body.classList.remove('dark-mode');
                btn.textContent = '🌙 Тёмная тема';
            }
        }

        function toggleTheme() {
            if (document.body.classList.contains('dark-mode')) {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            }
            applyTheme();
        }

        // === ДАННЫЕ ===
        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (parsed && Array.isArray(parsed.students) && Array.isArray(parsed.dates) && typeof parsed.attendance === 'object') {
                        return parsed;
                    }
                } catch (e) {
                    console.warn('Ошибка загрузки');
                }
            }
            return {
                students: defaultStudents.slice(),
                dates: defaultDates.slice(),
                attendance: {}
            };
        }

        let data = loadData();

        function saveData() {
            const studentRows = document.querySelectorAll('#attendanceTable tbody tr');
            studentRows.forEach((row, index) => {
                const nameSpan = row.querySelector('td:first-child span');
                if (nameSpan) {
                    data.students[index] = nameSpan.textContent.trim();
                }
            });

            data.students.forEach((student, studentIndex) => {
                data.dates.forEach((date, dateIndex) => {
                    const row = studentRows[studentIndex];
                    if (!row) return;
                    const cell = row.cells[dateIndex + 2]; // +2: ФИО, Посещено
                    if (cell) {
                        const key = `${studentIndex},${dateIndex}`;
                        data.attendance[key] = cell.textContent.trim();
                    }
                });
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            alert('Данные сохранены!');
        }

        function getAttendanceCount(studentIndex) {
            let count = 0;
            data.dates.forEach((_, dateIndex) => {
                const key = `${studentIndex},${dateIndex}`;
                if (data.attendance[key] && data.attendance[key].trim() !== '') {
                    count++;
                }
            });
            return count;
        }

        function renderTable() {
            const table = document.getElementById('attendanceTable');
            const thead = table.querySelector('thead');
            const tbody = table.querySelector('tbody');

            thead.innerHTML = '';
            tbody.innerHTML = '';

            const headerRow = document.createElement('tr');
            const thFio = document.createElement('th');
            thFio.textContent = 'ФИО';
            headerRow.appendChild(thFio);

            const thAttend = document.createElement('th');
            thAttend.textContent = 'Посещено';
            headerRow.appendChild(thAttend);

            data.dates.forEach((date, dateIndex) => {
                const thDate = document.createElement('th');
                thDate.textContent = date;
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = '✕';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`Удалить дату "${date}" и все отметки?`)) {
                        removeDate(dateIndex);
                        renderTable();
                    }
                });
                thDate.appendChild(delBtn);
                headerRow.appendChild(thDate);
            });
            thead.appendChild(headerRow);

            data.students.forEach((student, studentIndex) => {
                const tr = document.createElement('tr');

                const tdFio = document.createElement('td');
                const nameSpan = document.createElement('span');
                nameSpan.textContent = student;
                nameSpan.setAttribute('contenteditable', 'true');
                nameSpan.addEventListener('input', () => {
                    data.students[studentIndex] = nameSpan.textContent.trim();
                });
                tdFio.appendChild(nameSpan);

                const delStudentBtn = document.createElement('button');
                delStudentBtn.className = 'delete-btn';
                delStudentBtn.textContent = '✕';
                delStudentBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (data.students.length <= 1) {
                        alert('Нельзя удалить последнего студента!');
                        return;
                    }
                    if (confirm(`Удалить студента "${data.students[studentIndex]}"?`)) {
                        removeStudent(studentIndex);
                        renderTable();
                    }
                });
                tdFio.appendChild(delStudentBtn);
                tr.appendChild(tdFio);

                const tdAttend = document.createElement('td');
                tdAttend.textContent = getAttendanceCount(studentIndex);
                tr.appendChild(tdAttend);

                data.dates.forEach((date, dateIndex) => {
                    const td = document.createElement('td');
                    const key = `${studentIndex},${dateIndex}`;
                    td.textContent = data.attendance[key] || '';
                    td.setAttribute('contenteditable', 'true');
                    td.addEventListener('input', () => {
                        let val = td.textContent.trim();
                        if (val.length > 1) val = val.charAt(0);
                        data.attendance[key] = val;
                        tdAttend.textContent = getAttendanceCount(studentIndex);
                    });
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });

            document.getElementById('studentCount').textContent = `Всего студентов: ${data.students.length}`;
        }

        function addStudent() {
            const newName = prompt('Введите ФИО студента:');
            if (newName && newName.trim()) {
                data.students.push(newName.trim());
                renderTable();
            }
        }

        function addDate() {
            const newDate = prompt('Введите дату (например, 25.04.2026):');
            if (newDate && newDate.trim()) {
                data.dates.push(newDate.trim());
                renderTable();
            }
        }

        function removeStudent(studentIndex) {
            if (data.students.length <= 1) {
                alert('Нельзя удалить последнего студента!');
                return;
            }
            data.students.splice(studentIndex, 1);
            const newAttendance = {};
            Object.keys(data.attendance).forEach(key => {
                const [sIdx, dIdx] = key.split(',').map(Number);
                if (sIdx === studentIndex) return;
                const newSIdx = sIdx > studentIndex ? sIdx - 1 : sIdx;
                newAttendance[`${newSIdx},${dIdx}`] = data.attendance[key];
            });
            data.attendance = newAttendance;
        }

        function removeDate(dateIndex) {
            data.dates.splice(dateIndex, 1);
            const newAttendance = {};
            Object.keys(data.attendance).forEach(key => {
                const [sIdx, dIdx] = key.split(',').map(Number);
                if (dIdx === dateIndex) return;
                const newDIdx = dIdx > dateIndex ? dIdx - 1 : dIdx;
                newAttendance[`${sIdx},${newDIdx}`] = data.attendance[key];
            });
            data.attendance = newAttendance;
        }

        function clearAllMarks() {
            if (confirm('Удалить ВСЕ отметки о посещаемости? Студенты и даты останутся.')) {
                data.attendance = {};
                saveData();
                renderTable();
            }
        }

        applyTheme();
        renderTable();
    </script>
</body>
</html>
