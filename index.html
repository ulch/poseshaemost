<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Посещаемость групп</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
<div class="auth-container" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <button class="theme-toggle-btn" id="themeToggle">🌙 Тёмная тема</button>
    <button class="login-btn" id="authButton">Войти для просмотра</button>
</div>

<div class="group-header">
    <p class="org-name">Русско-Азиатский экономико-правовой колледж</p>
    <h1>Посещаемость студентов</h1>
</div>

<div class="add-group-panel" id="addGroupPanel">
    <input type="text" id="newGroupName" placeholder="Название новой группы">
    <button id="addGroupBtn">＋ Добавить группу</button>
</div>

<!-- Кнопка возврата к предметам -->
<div style="text-align: left; margin-bottom: 15px;">
    <button id="backToSubjectsBtn" class="login-btn" style="display: none;">← Назад к предметам</button>
</div>

<div class="disciplines-card">
    <h2 id="listTitle">📋 Списки групп</h2>
    <div id="subjectButtons" class="subject-selector" style="text-align: center; margin-bottom: 15px;"></div>

    <!-- Поле поиска групп (показывается только при выбранном предмете) -->
    <div id="groupSearchContainer" style="margin-bottom: 15px; display: none;">
        <input type="text" id="groupSearchInput" class="search-box" placeholder="🔍 Поиск группы..." style="width: 100%; max-width: 300px;">
    </div>

    <ul class="groups-list" id="groupsList"></ul>
</div>

<!-- Модальное окно входа -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3 style="margin-bottom: 20px; font-style: italic;">Вход</h3>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button id="loginSubmit">Войти</button>
        <p style="font-size:12px; color:var(--text-color); margin-top:12px; opacity:0.7; text-align: center;">
            * учётные данные предоставляются преподавателем
        </p>
    </div>
</div>

<script>
// ========== ПОЛЬЗОВАТЕЛИ ==========
const users = [
    { login: 'bio', password: '123', subjects: ['Биология'] },
    { login: 'chem', password: '123', subjects: ['Химия', 'Биология'] },
    { login: 'inf', password: '123', subjects: ['Информатика', 'Математика'] }
];
let currentUser = null;
let currentSubject = null;
let customGroups = {};
let hiddenGroups = {};   // скрытые (удалённые) группы для каждого предмета

// ========== ТЕМА ==========
function applyTheme() {
    const theme = localStorage.getItem('theme') || 'light';
    const btn = document.getElementById('themeToggle');
    if (theme === 'dark') {
        document.body.classList.add('dark-mode');
        btn.textContent = '☀️ Светлая тема';
    } else {
        document.body.classList.remove('dark-mode');
        btn.textContent = '🌙 Тёмная тема';
    }
}
document.getElementById('themeToggle').onclick = () => {
    const newTheme = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
    localStorage.setItem('theme', newTheme);
    applyTheme();
};

// ========== АВТОРИЗАЦИЯ ==========
function checkAuth() {
    const stored = localStorage.getItem('currentUser');
    if (stored) {
        try {
            const u = JSON.parse(stored);
            const found = users.find(x => x.login === u.login && x.password === u.password);
            if (found) {
                currentUser = found;
                updateUI();
                return;
            }
        } catch(e) {}
    }
    currentUser = null;
    updateUI();
}

function updateUI() {
    const authBtn = document.getElementById('authButton');
    const panel = document.getElementById('addGroupPanel');
    const subjDiv = document.getElementById('subjectButtons');
    const listUl = document.getElementById('groupsList');
    const title = document.getElementById('listTitle');
    const backBtn = document.getElementById('backToSubjectsBtn');
    const searchContainer = document.getElementById('groupSearchContainer');

    if (currentUser) {
        authBtn.textContent = 'Выйти';
        authBtn.className = 'logout-btn';

        // Если один предмет – сразу выбираем его, без повторного вызова updateUI
        if (currentUser.subjects.length === 1 && !currentSubject) {
            currentSubject = currentUser.subjects[0];
        }

        if (currentSubject) {
            // Показываем список групп для выбранного предмета
            title.textContent = `📋 Группы — ${currentSubject}`;
            subjDiv.innerHTML = '';
            panel.classList.add('visible');
            searchContainer.style.display = 'block';
            backBtn.style.display = (currentUser.subjects.length > 1) ? 'inline-block' : 'none';
            loadCustomGroups();
            loadHiddenGroups();
            renderGroupList();
        } else {
            // Несколько предметов и ни один не выбран – показываем кнопки предметов
            title.textContent = '📚 Выберите предмет';
            subjDiv.innerHTML = '';
            currentUser.subjects.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = 'subject-btn';
                btn.textContent = sub;
                btn.onclick = () => {
                    currentSubject = sub;
                    updateUI();
                };
                subjDiv.appendChild(btn);
            });
            listUl.innerHTML = '';
            panel.classList.remove('visible');
            backBtn.style.display = 'none';
            searchContainer.style.display = 'none';
        }
    } else {
        authBtn.textContent = 'Войти для просмотра';
        authBtn.className = 'login-btn';
        currentSubject = null;
        title.textContent = '📋 Списки групп';
        subjDiv.innerHTML = '';
        listUl.innerHTML = '';
        panel.classList.remove('visible');
        backBtn.style.display = 'none';
        searchContainer.style.display = 'none';
    }
}

// ========== ЗАГРУЗКА ДАННЫХ ГРУПП ==========
function getDefaultGroups(subject) {
    const map = {
        'Биология': ['КИО-25-9', 'КЭО-25-9'],
        'Химия': ['КИО-25-9'],
        'Информатика': ['КТО-25-9'],
        'Математика': ['КТО-25-9', 'КЭО-25-9']
    };
    return map[subject] || [];
}

function loadCustomGroups() {
    if (!currentSubject) return;
    const key = 'customGroups_' + currentSubject;
    const stored = localStorage.getItem(key);
    customGroups[currentSubject] = stored ? JSON.parse(stored) : [];
}

function saveCustomGroups() {
    if (!currentSubject) return;
    localStorage.setItem('customGroups_' + currentSubject, JSON.stringify(customGroups[currentSubject]));
}

function loadHiddenGroups() {
    if (!currentSubject) return;
    const key = 'hiddenGroups_' + currentSubject;
    const stored = localStorage.getItem(key);
    hiddenGroups[currentSubject] = stored ? JSON.parse(stored) : [];
}

function saveHiddenGroups() {
    if (!currentSubject) return;
    localStorage.setItem('hiddenGroups_' + currentSubject, JSON.stringify(hiddenGroups[currentSubject]));
}

// ========== ПОИСК ГРУПП ==========
document.getElementById('groupSearchInput').addEventListener('input', function(e) {
    const query = e.target.value.trim().toLowerCase();
    document.querySelectorAll('#groupsList li').forEach(li => {
        const text = li.querySelector('.group-name')?.textContent.toLowerCase() || '';
        li.style.display = (query === '' || text.includes(query)) ? '' : 'none';
    });
});

// ========== ОТРИСОВКА СПИСКА ГРУПП ==========
function renderGroupList() {
    const ul = document.getElementById('groupsList');
    ul.innerHTML = '';
    if (!currentSubject) return;

    const def = getDefaultGroups(currentSubject);
    const cust = customGroups[currentSubject] || [];
    const hidden = hiddenGroups[currentSubject] || [];
    const all = [...new Set([...def, ...cust])].filter(g => !hidden.includes(g));

    all.forEach(group => {
        const li = document.createElement('li');
        li.style.display = 'flex';
        li.style.alignItems = 'center';
        li.style.marginBottom = '8px';

        const a = document.createElement('a');
        a.className = 'group-name';
        a.textContent = group;
        a.href = `group.html?subject=${encodeURIComponent(currentSubject)}&group=${encodeURIComponent(group)}`;
        if (!currentUser) a.classList.add('disabled');
        a.style.flex = '1';
        li.appendChild(a);

        // Кнопка удаления группы (серый крестик)
        if (currentUser) {
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '✕';
            delBtn.style.marginLeft = '10px';
            delBtn.style.background = '#6c757d';   // серый цвет
            delBtn.style.color = 'white';
            delBtn.style.border = 'none';
            delBtn.style.borderRadius = '50%';
            delBtn.style.width = '22px';
            delBtn.style.height = '22px';
            delBtn.style.fontSize = '14px';
            delBtn.style.cursor = 'pointer';
            delBtn.style.lineHeight = '1';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                if (confirm(`Удалить группу "${group}"? Группа будет скрыта из списка.`)) {
                    hideGroup(group);
                    renderGroupList();
                }
            };
            li.appendChild(delBtn);
        }

        ul.appendChild(li);
    });

    // Обновить фильтр поиска
    document.getElementById('groupSearchInput').dispatchEvent(new Event('input'));
}

// ========== УДАЛЕНИЕ (СКРЫТИЕ) ГРУППЫ ==========
function hideGroup(name) {
    if (!hiddenGroups[currentSubject]) hiddenGroups[currentSubject] = [];
    if (!hiddenGroups[currentSubject].includes(name)) {
        hiddenGroups[currentSubject].push(name);
    }
    if (customGroups[currentSubject]) {
        customGroups[currentSubject] = customGroups[currentSubject].filter(g => g !== name);
        saveCustomGroups();
    }
    saveHiddenGroups();
}

// ========== ДОБАВЛЕНИЕ ГРУППЫ ==========
document.getElementById('addGroupBtn').onclick = () => {
    const name = document.getElementById('newGroupName').value.trim();
    if (!name) return alert('Введите название');
    // Если группа была скрыта – восстанавливаем
    if (hiddenGroups[currentSubject] && hiddenGroups[currentSubject].includes(name)) {
        hiddenGroups[currentSubject] = hiddenGroups[currentSubject].filter(g => g !== name);
        saveHiddenGroups();
        document.getElementById('newGroupName').value = '';
        renderGroupList();
        return;
    }
    const allVisible = [...new Set([...getDefaultGroups(currentSubject), ...(customGroups[currentSubject] || [])])]
                        .filter(g => !(hiddenGroups[currentSubject] || []).includes(g));
    if (allVisible.includes(name)) {
        return alert('Такая группа уже есть в списке');
    }
    if (!customGroups[currentSubject]) customGroups[currentSubject] = [];
    customGroups[currentSubject].push(name);
    saveCustomGroups();
    document.getElementById('newGroupName').value = '';
    renderGroupList();
};

// ========== КНОПКА «НАЗАД К ПРЕДМЕТАМ» ==========
document.getElementById('backToSubjectsBtn').onclick = () => {
    currentSubject = null;
    updateUI();
};

// ========== МОДАЛЬНОЕ ОКНО ==========
const modal = document.getElementById('loginModal');
document.getElementById('authButton').onclick = () => {
    if (currentUser) {
        localStorage.removeItem('currentUser');
        currentUser = null;
        currentSubject = null;
        updateUI();
    } else {
        modal.style.display = 'block';
    }
};
document.querySelector('.close').onclick = () => modal.style.display = 'none';
window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
document.getElementById('loginSubmit').onclick = () => {
    const login = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    const user = users.find(u => u.login === login && u.password === pass);
    if (user) {
        currentUser = user;
        localStorage.setItem('currentUser', JSON.stringify({login: user.login, password: user.password}));
        modal.style.display = 'none';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        updateUI();
    } else alert('Неверный логин или пароль');
};

applyTheme();
checkAuth();
</script>
</body>
</html>
